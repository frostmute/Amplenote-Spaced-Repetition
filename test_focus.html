<!DOCTYPE html>
<html>
<head>
<style>
.card {
  width: 200px;
  height: 200px;
  background: red;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  perspective: 1000px;
}
.card.flipped {
  transform: rotateX(180deg);
}
</style>
</head>
<body>
  <div class="card" id="c">Flip me</div>
  <button onclick="document.getElementById('c').classList.toggle('flipped')">Flip</button>
</body>
</html>
